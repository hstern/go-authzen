# Required PR checks. Build the common `ci` image ONCE (the `build` job), push it to the
# Forgejo container registry, then fan out — each check pulls the image and runs off it in its
# own job, so a single CI run surfaces EVERY failure (a failing test + a vet error + a lint
# warning all at once), not just the first.
#
# `runs-on: fj-bellows` — the ephemeral autoscaling runner (Linode VMs spun up per job).
# `ubuntu-latest` does not exist as a label on this Forgejo instance.
#
# Why a `docker run`, never a `RUN` build layer: the runner builds against a podman image store
# (the `docker` CLI is podman's buildx-compat shim), whose layer cache survives across runs — a
# `RUN go test` keyed on an unchanged tree would replay a cached layer and never re-execute (a
# silent no-op gate). Run the check at container-run time and it executes every time.
#
# --pids-limit on every run: podman maps the CLI default PidsLimit=0 to pids.max=1, so anything
# that forks (go vet/test/-race, golangci-lint) can't without an explicit limit.
#
# Cross-job image sharing — the registry pivot:
#
#   The build job tags the image with the commit SHA AND a fully-qualified path on the Forgejo
#   container registry (git.stern.ca/ascend/go-authzen/ci:<sha>) and pushes the latter; each
#   check job pulls that and `docker tag`s it back to the short local name so `docker run "$IMAGE"`
#   keeps working unchanged. The registry is the shared substrate.
#
#   The CI image is a NESTED package `go-authzen/ci` under the go-authzen repo path. The library
#   produces no deployable image of its own (it's a Go library, not a service), so cleanup
#   deleting THIS run's `go-authzen/ci:<sha>` can never touch anything else.
#
#   Auth uses an org-level secret `CONTAINER_REGISTRY_TOKEN` (Forgejo PAT, scopes `write:package`
#   + `delete:package`). The per-job ephemeral `secrets.GITHUB_TOKEN` does NOT carry package
#   permissions on this Forgejo version, and `FORGEJO_*` is a restricted secret-name prefix, so
#   we use a neutral name.
name: ci
on:
  pull_request:
  workflow_dispatch:

env:
  IMAGE: go-authzen-ci:${{ github.sha }}
  REGISTRY_IMAGE: git.stern.ca/ascend/go-authzen/ci:${{ github.sha }}

jobs:
  build:
    runs-on: fj-bellows
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history baked into the image — future interop / scenario tests may need
          # ref resolution, and the cost of fetch-depth: 0 on a small library is negligible.
          fetch-depth: 0
      - name: Login to Forgejo container registry
        run: echo "${{ secrets.CONTAINER_REGISTRY_TOKEN }}" | docker login git.stern.ca -u henry --password-stdin
      # Build the common check image once. --load lands it locally under both tags; we only
      # need to push the registry-qualified one — they share layers, so the push is cheap.
      - name: Build the common CI image
        run: docker build --load --target ci -t "$IMAGE" -t "$REGISTRY_IMAGE" .
      - name: Push the CI image to the Forgejo container registry
        run: docker push "$REGISTRY_IMAGE"

  static:
    needs: build
    runs-on: fj-bellows
    steps:
      - name: Login to Forgejo container registry
        run: echo "${{ secrets.CONTAINER_REGISTRY_TOKEN }}" | docker login git.stern.ca -u henry --password-stdin
      - name: Pull the common CI image
        run: |
          docker pull "$REGISTRY_IMAGE"
          docker tag "$REGISTRY_IMAGE" "$IMAGE"
      - name: gofmt + go vet + go mod tidy
        run: docker run --rm --pids-limit=4096 "$IMAGE" sh scripts/check-static.sh

  test:
    needs: build
    runs-on: fj-bellows
    steps:
      - name: Login to Forgejo container registry
        run: echo "${{ secrets.CONTAINER_REGISTRY_TOKEN }}" | docker login git.stern.ca -u henry --password-stdin
      - name: Pull the common CI image
        run: |
          docker pull "$REGISTRY_IMAGE"
          docker tag "$REGISTRY_IMAGE" "$IMAGE"
      - name: go test -race -shuffle=on
        run: docker run --rm --pids-limit=4096 "$IMAGE" sh scripts/check-test.sh

  lint:
    needs: build
    runs-on: fj-bellows
    steps:
      - name: Login to Forgejo container registry
        run: echo "${{ secrets.CONTAINER_REGISTRY_TOKEN }}" | docker login git.stern.ca -u henry --password-stdin
      - name: Pull the common CI image
        run: |
          docker pull "$REGISTRY_IMAGE"
          docker tag "$REGISTRY_IMAGE" "$IMAGE"
      - name: golangci-lint
        run: docker run --rm --pids-limit=4096 "$IMAGE" golangci-lint run ./...

  # Live OpenID AuthZEN Todo scenario — interop/ package tests under the `interop` build tag.
  # Without the tag the package's sanity tests already run inside the `test` job; this job
  # adds the network-dependent PEP-role tests against <https://todo.authzen-interop.net>.
  # Not yet a required check on branch protection — the gate flips after a green run here
  # confirms the runner has outbound HTTPS to the live PDP.
  interop:
    needs: build
    runs-on: fj-bellows
    steps:
      - name: Login to Forgejo container registry
        run: echo "${{ secrets.CONTAINER_REGISTRY_TOKEN }}" | docker login git.stern.ca -u henry --password-stdin
      - name: Pull the common CI image
        run: |
          docker pull "$REGISTRY_IMAGE"
          docker tag "$REGISTRY_IMAGE" "$IMAGE"
      - name: go test -tags interop -race -shuffle=on
        run: docker run --rm --pids-limit=4096 "$IMAGE" sh scripts/check-interop.sh

  # Clean up after this run's CI image — both the worker's local cache AND the Forgejo container
  # registry copy. Each PR/run produces a fresh per-SHA tag; without cleanup they pile up.
  # `always()` so cleanup runs even when a check failed; `|| true` so cleanup never fails the
  # workflow itself. If `build` failed before push, the DELETE 404s and is swallowed.
  cleanup:
    needs: [static, test, lint, interop]
    if: always()
    runs-on: fj-bellows
    steps:
      - name: Drop this run's CI image from local cache
        run: docker rmi -f "$IMAGE" "$REGISTRY_IMAGE" 2>/dev/null || true
      - name: Delete this run's CI tag from the Forgejo container registry
        run: |
          curl -fsS -X DELETE \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://git.stern.ca/api/v1/packages/ascend/container/go-authzen%2Fci/${{ github.sha }}" \
            || true
